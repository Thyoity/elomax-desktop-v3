<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ELOMAX</title>
    <!-- Ionicons bundled locally (see vite-plugin-static-copy in vite.config.ts).
         Loaded from /ionicons/ in both dev and prod so the app is fully offline-capable. -->
    <script type="module" src="/ionicons/ionicons.esm.js"></script>
    <script nomodule src="/ionicons/ionicons.js"></script>
  </head>
  <!--
    Inline dark background so the very first paint matches the app theme
    instead of WebView2's default white. Without this you get a brief
    white flash before Vue mounts and the SCSS bundle replaces this rule.
    Window is also `"visible": false` in tauri.conf.json — it's revealed
    from main.ts after Vue mounts.
  -->
  <body style="margin: 0; background-color: #16151e;">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
